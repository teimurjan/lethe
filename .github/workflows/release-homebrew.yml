name: release-homebrew

# Triggered when release-please publishes a GitHub Release. Renders
# the Homebrew formula by hashing the macOS tarball read from main's
# `release_artifacts/` (LFS) and pushes the formula to the
# `teimurjan/homebrew-lethe` tap repo.
#
# We read from main rather than the GitHub Release assets so we
# don't race with `release-please.yml`'s upload step. The formula
# itself still points at `releases/download/<tag>/<file>` because
# that's the URL Homebrew runs against on user machines — the
# upload-assets job in release-please.yml ensures it resolves.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (defaults to current ref)."
        required: false

permissions:
  contents: read

jobs:
  homebrew:
    name: update homebrew tap
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          lfs: true
      - name: render formula from release_artifacts
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#lethe-v}"
          ARM_TAR="lethe-macos-arm64.tar.gz"

          if [ ! -f "release_artifacts/${ARM_TAR}" ]; then
            echo "::error::release_artifacts/${ARM_TAR} missing on main."
            ls -la release_artifacts/ || true
            exit 1
          fi
          SHA_ARM=$(sha256sum "release_artifacts/${ARM_TAR}" | awk '{print $1}')

          mkdir -p Formula
          cat > Formula/lethe.rb <<EOF
          class Lethe < Formula
            desc "Persistent memory store for LLM agents"
            homepage "https://github.com/teimurjan/lethe"
            version "${VERSION}"
            license "MIT"

            depends_on arch: :arm64
            depends_on :macos

            url "https://github.com/teimurjan/lethe/releases/download/${TAG}/${ARM_TAR}"
            sha256 "${SHA_ARM}"

            def install
              bin.install "lethe"
              bin.install "lethe-claude-code"
              bin.install "lethe-codex"
              # All binaries are linked with rpath \`@loader_path\`, so
              # libduckdb resolves when shipped alongside them in bin/.
              bin.install "libduckdb.dylib"
            end

            test do
              system "#{bin}/lethe", "--version"
              system "#{bin}/lethe-claude-code", "--version"
              system "#{bin}/lethe-codex", "--version"
            end
          end
          EOF
      - name: push to tap repo
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${GH_TOKEN}@github.com/teimurjan/homebrew-lethe.git" tap
          mkdir -p tap/Formula
          cp Formula/lethe.rb tap/Formula/lethe.rb
          cd tap
          git config user.name  "lethe-release-bot"
          git config user.email "lethe-release-bot@users.noreply.github.com"
          git add Formula/lethe.rb
          git commit -m "lethe ${TAG}"
          git push
