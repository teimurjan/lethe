[build-system]
requires = ["maturin>=1.7,<2.0"]
build-backend = "maturin"

[project]
name = "lethe-rust"
version = "0.1.0"
description = "PyO3 bindings to the Rust port of lethe."
requires-python = ">=3.9"
license = { text = "MIT" }

[tool.maturin]
module-name = "lethe_rust"
manifest-path = "Cargo.toml"
features = ["pyo3/extension-module"]
