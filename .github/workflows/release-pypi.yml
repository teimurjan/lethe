name: release-pypi

# Triggered when release-please publishes a GitHub Release. Reads
# maturin wheels from main's `release_artifacts/` (LFS-tracked,
# committed onto the release-please PR branch by
# `build-binaries.yml` before merge plus the maintainer's local
# macOS-arm64 wheel) and publishes them to PyPI under
# `lethe-memory`.
#
# We read from main rather than the GitHub Release assets so we
# don't race with `release-please.yml`'s upload step.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (defaults to current ref)."
        required: false

permissions:
  contents: read
  id-token: write  # PyPI Trusted Publishing

jobs:
  publish:
    # Skip plugin-only releases: `lethe-plugins-v*` tags carry no binaries.
    # Manual workflow_dispatch always runs (operator override).
    if: ${{ github.event_name != 'release' || startsWith(github.event.release.tag_name, 'lethe-v') }}
    name: publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/lethe-memory
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          lfs: true
      - name: stage wheels for upload
        run: |
          set -euo pipefail
          mkdir -p dist
          # Match wheels only — release_artifacts/ also holds tarballs
          # / .node files for other registries.
          shopt -s nullglob
          wheels=(release_artifacts/*.whl)
          if [ ${#wheels[@]} -eq 0 ]; then
            echo "::error::No wheels under release_artifacts/ on main."
            ls -la release_artifacts/ || true
            exit 1
          fi
          cp "${wheels[@]}" dist/
          ls -la dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
