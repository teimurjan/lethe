name: release-rust

# Triggered when release-please publishes a GitHub Release. Publishes
# the four Rust crates to crates.io (in dependency order) and updates
# the Homebrew formula at `teimurjan/homebrew-lethe`.
#
# Multi-platform binaries are built locally via
# `scripts/release/build.sh` and uploaded to the GitHub Release as
# tarballs *before* this workflow runs. The workflow downloads them
# only to compute SHA256s for the formula.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (defaults to current ref)."
        required: false

permissions:
  contents: read

jobs:
  publish-crates:
    name: publish crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          # `cargo publish` runs a build verification before upload.
          # libduckdb-sys' build.rs needs this to download the prebuilt
          # libduckdb instead of trying to link against a non-existent
          # system one (`cannot find -lduckdb`).
          DUCKDB_DOWNLOAD_LIB: "1"
        run: |
          set -euo pipefail

          # Workspace version drives all crate versions (see Cargo.toml
          # `[workspace.package] version`).
          ver=$(grep -m1 -E '^version *= *"' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')

          # crates.io is append-only; a partial run that published some
          # crates before failing leaves them unrepublishable. Treat
          # "already at this version" as success per crate.
          publish_if_new() {
            local crate=$1
            local current
            # crates.io rejects requests without a User-Agent (HTTP 403).
            current=$(curl -fsSL -A "lethe-release-bot (github.com/teimurjan/lethe)" \
                        "https://crates.io/api/v1/crates/${crate}" \
                      | python3 -c 'import sys,json; print(json.load(sys.stdin).get("crate",{}).get("max_version",""))' \
                      2>/dev/null || echo "")
            if [ "$current" = "$ver" ]; then
              echo ">> ${crate}@${ver} already on crates.io, skipping"
              return 0
            fi
            cargo publish -p "$crate" --token "$CARGO_REGISTRY_TOKEN"
            sleep 30
          }

          # Order matters: dependents wait for the registry index to
          # refresh after each publish.
          publish_if_new lethe-core
          publish_if_new lethe-tui
          publish_if_new lethe-cli
          publish_if_new lethe-claude-code

  homebrew:
    name: update homebrew tap
    runs-on: ubuntu-latest
    # Flip to `if: true` once `teimurjan/homebrew-lethe` exists and
    # `HOMEBREW_TAP_GITHUB_TOKEN` is set in repo secrets.
    if: false
    steps:
      - name: render formula from release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          ARM_TAR="lethe-macos-arm64.tar.gz"
          X64_TAR="lethe-macos-x64.tar.gz"

          # Pull whichever macOS tarballs the human uploaded to the release.
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" \
            --pattern "$ARM_TAR" --pattern "$X64_TAR" --dir .

          SHA_ARM=$(shasum -a 256 "$ARM_TAR" | awk '{print $1}')
          SHA_X64=$(shasum -a 256 "$X64_TAR" | awk '{print $1}')

          mkdir -p Formula
          cat > Formula/lethe.rb <<EOF
          class Lethe < Formula
            desc "Persistent memory store for LLM agents"
            homepage "https://github.com/teimurjan/lethe"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/teimurjan/lethe/releases/download/${TAG}/${ARM_TAR}"
                sha256 "${SHA_ARM}"
              else
                url "https://github.com/teimurjan/lethe/releases/download/${TAG}/${X64_TAR}"
                sha256 "${SHA_X64}"
              end
            end

            def install
              bin.install "lethe"
              bin.install "lethe-claude-code"
            end

            test do
              system "#{bin}/lethe", "--version"
              system "#{bin}/lethe-claude-code", "--version"
            end
          end
          EOF
      - name: push to tap repo
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${GH_TOKEN}@github.com/teimurjan/homebrew-lethe.git" tap
          mkdir -p tap/Formula
          cp Formula/lethe.rb tap/Formula/lethe.rb
          cd tap
          git config user.name  "lethe-release-bot"
          git config user.email "lethe-release-bot@users.noreply.github.com"
          git add Formula/lethe.rb
          git commit -m "lethe ${TAG}"
          git push
