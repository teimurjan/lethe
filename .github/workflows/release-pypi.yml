name: release-pypi

# Triggered when release-please publishes a GitHub Release.
# Picks up maturin wheels uploaded to the release as assets and
# publishes them to PyPI under `lethe-memory`.
#
# Wheels are built locally via `scripts/release/build.sh --pypi` and
# uploaded to the GitHub Release before this runs.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (defaults to current ref)."
        required: false

permissions:
  contents: read
  id-token: write  # PyPI Trusted Publishing

jobs:
  publish:
    name: publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/lethe-memory
    steps:
      - name: download wheels from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" \
            --pattern "*.whl" --pattern "*.tar.gz" --dir dist || true
          # Drop non-wheel/sdist tarballs the rust workflow uploads.
          find dist -type f ! -name "*.whl" ! -name "lethe_memory-*.tar.gz" -delete
          ls -la dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
