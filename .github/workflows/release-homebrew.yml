name: release-homebrew

# Triggered when release-please publishes a GitHub Release. Renders
# the Homebrew formula from the macOS tarballs attached to the release
# and pushes it to the `teimurjan/homebrew-lethe` tap repo.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (defaults to current ref)."
        required: false

permissions:
  contents: read

jobs:
  homebrew:
    name: update homebrew tap
    runs-on: ubuntu-latest
    steps:
      - name: render formula from release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          ARM_TAR="lethe-macos-arm64.tar.gz"

          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" \
            --pattern "$ARM_TAR" --dir .

          SHA_ARM=$(shasum -a 256 "$ARM_TAR" | awk '{print $1}')

          mkdir -p Formula
          cat > Formula/lethe.rb <<EOF
          class Lethe < Formula
            desc "Persistent memory store for LLM agents"
            homepage "https://github.com/teimurjan/lethe"
            version "${VERSION}"
            license "MIT"

            depends_on arch: :arm64
            depends_on :macos

            url "https://github.com/teimurjan/lethe/releases/download/${TAG}/${ARM_TAR}"
            sha256 "${SHA_ARM}"

            def install
              bin.install "lethe"
              bin.install "lethe-claude-code"
              # Both binaries are linked with rpath \`@loader_path\`, so
              # libduckdb resolves when shipped alongside them in bin/.
              bin.install "libduckdb.dylib"
            end

            test do
              system "#{bin}/lethe", "--version"
              system "#{bin}/lethe-claude-code", "--version"
            end
          end
          EOF
      - name: push to tap repo
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${GH_TOKEN}@github.com/teimurjan/homebrew-lethe.git" tap
          mkdir -p tap/Formula
          cp Formula/lethe.rb tap/Formula/lethe.rb
          cd tap
          git config user.name  "lethe-release-bot"
          git config user.email "lethe-release-bot@users.noreply.github.com"
          git add Formula/lethe.rb
          git commit -m "lethe ${TAG}"
          git push
