name: release-npm

# Triggered when release.yml flips a `lethe-vX.Y.Z` GitHub Release
# from draft to published. The release at that point holds the
# per-platform binary tarballs (with libduckdb bundled inside) and
# the `.node` files. We:
#
#   1. Download the `.node` and tarball/zip for each napi triple.
#   2. Extract libduckdb from each tarball next to its matching
#      `.node` inside `npm/<triple>/`.
#   3. Patch each per-platform `package.json` so its `files` field
#      lists libduckdb alongside the `.node`.
#   4. Run `napi prepublish` (auto-publishes per-platform packages).
#   5. Publish the root meta package with `optionalDependencies`
#      pointing at each per-platform package.
#
# `.node` files at link time have rpath `@loader_path` / `$ORIGIN`
# (set by `crates/lethe-node/build.rs`) so the runtime loader
# resolves libduckdb from the same dir as the `.node`.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (defaults to current ref)."
        required: false

permissions:
  contents: read

jobs:
  publish:
    name: publish to npm
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/lethe-node
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - run: npm install

      - name: stage per-platform npm dirs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail

          # Materialise `npm/<napi-triple>/package.json` for each
          # triple in `napi.triples.additional`.
          npx napi create-npm-dir -t .

          # Mapping: napi platformArchABI ↔ our friendly tarball stem ↔ libduckdb filename.
          # Friendly stem matches `release.yml`'s matrix `friendly`
          # field plus the macOS local build's `FNAME=macos-arm64`.
          declare -A FRIENDLY=(
            [linux-x64-gnu]=linux-x64
            [linux-arm64-gnu]=linux-arm64
            [darwin-x64]=macos-x64
            [darwin-arm64]=macos-arm64
            [win32-x64-msvc]=windows-x64
            [win32-arm64-msvc]=windows-arm64
          )
          declare -A LIBNAME=(
            [linux-x64-gnu]=libduckdb.so
            [linux-arm64-gnu]=libduckdb.so
            [darwin-x64]=libduckdb.dylib
            [darwin-arm64]=libduckdb.dylib
            [win32-x64-msvc]=duckdb.dll
            [win32-arm64-msvc]=duckdb.dll
          )

          # napi-rs v2 with scoped name (`@lethe-memory/lethe`) lays
          # each per-platform package out as:
          #   npm/<triple>/
          #     package.json                       (name: @lethe-memory/lethe-<triple>)
          #     @lethe-memory/lethe.<triple>.node  (referenced by `main`)
          # libduckdb must sit next to the `.node` for the rpath
          # (`@loader_path`/`$ORIGIN`) to resolve, so it goes into the
          # same `@lethe-memory/` subdirectory.
          mkdir -p _staging
          for triple in "${!FRIENDLY[@]}"; do
            dir="npm/${triple}"
            [ -d "$dir" ] || continue
            f="${FRIENDLY[$triple]}"
            lib="${LIBNAME[$triple]}"
            inner="${dir}/@lethe-memory"
            mkdir -p "$inner"

            # Pull `.node` into the scoped subdir.
            if ! gh release download "$TAG" \
                  --repo "$GITHUB_REPOSITORY" \
                  --pattern "lethe-${f}.node" \
                  --dir "$inner" 2>/dev/null; then
              echo "no .node for $f; skipping $triple"
              rm -rf "$dir"
              continue
            fi
            mv "$inner/lethe-${f}.node" "$inner/lethe.${triple}.node"

            # Pull the tarball/zip into staging and extract libduckdb.
            rm -rf "_staging/${f}"
            mkdir -p "_staging/${f}"
            if [ "$triple" = win32-x64-msvc ] || [ "$triple" = win32-arm64-msvc ]; then
              gh release download "$TAG" --repo "$GITHUB_REPOSITORY" \
                --pattern "lethe-${f}.zip" --dir "_staging/${f}"
              (cd "_staging/${f}" && unzip -q "lethe-${f}.zip")
            else
              gh release download "$TAG" --repo "$GITHUB_REPOSITORY" \
                --pattern "lethe-${f}.tar.gz" --dir "_staging/${f}"
              tar -xzf "_staging/${f}/lethe-${f}.tar.gz" -C "_staging/${f}"
            fi
            cp "_staging/${f}/lethe-${f}/${lib}" "$inner/${lib}"

            # Patch `files` so the published tarball includes libduckdb
            # alongside the `.node` inside the scoped subdir.
            tmp="$(mktemp)"
            jq --arg lib "@lethe-memory/${lib}" '.files += [$lib]' "$dir/package.json" > "$tmp"
            mv "$tmp" "$dir/package.json"

            echo "staged $triple: $(ls -R "$dir" | tr '\n' ' ')"
          done
          rm -rf _staging

      - name: publish per-platform packages and root
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail

          ROOT_NAME=$(jq -r .name package.json)
          VERSION=$(jq -r .version package.json)

          # Idempotent per-platform publish. `napi prepublish` would
          # also do this, but it errors out on republish — and a
          # partial earlier run can leave per-platforms already on
          # npm, blocking the meta package from ever shipping.
          for dir in npm/*/; do
            [ -d "$dir" ] || continue
            pkg=$(jq -r .name "${dir}package.json")
            if curl -fsSL "https://registry.npmjs.org/${pkg}/${VERSION}" >/dev/null 2>&1; then
              echo ">> ${pkg}@${VERSION} already on npm, skipping"
              continue
            fi
            (cd "$dir" && npm publish --access public)
          done

          # Wire each per-platform package into the meta as an
          # optionalDependency. npm picks the right one at install
          # based on the consumer's `os`/`cpu`/libc.
          tmp=$(mktemp)
          jq --arg root "$ROOT_NAME" --arg ver "$VERSION" '
            .optionalDependencies = (
              [
                "darwin-arm64",
                "linux-x64-gnu",
                "linux-arm64-gnu",
                "win32-x64-msvc",
                "win32-arm64-msvc"
              ]
              | map({(($root + "-" + .)): $ver})
              | add
            )
          ' package.json > "$tmp"
          mv "$tmp" package.json

          # Ship the meta — idempotent against re-runs.
          if curl -fsSL "https://registry.npmjs.org/${ROOT_NAME}/${VERSION}" >/dev/null 2>&1; then
            echo ">> ${ROOT_NAME}@${VERSION} already on npm, skipping"
          else
            npm publish --access public
          fi
