name: build-binaries

# Triggered by a `/build` comment from a maintainer on the open
# release-please PR (or manually via workflow_dispatch with a PR
# number). Builds the Linux + Windows matrix and commits all
# artifacts to the PR branch under `release_artifacts/` (Git LFS).
# macOS-arm64 is not in the matrix — the maintainer builds it
# locally via `scripts/release/build.sh --napi --pypi` and pushes
# those files to the PR branch separately. The PR has a
# `release-artifacts-check` status that turns green only once every
# expected file is present.
#
# The artifact commit is pushed under RELEASE_PAT so it fires
# `pull_request: synchronize` naturally and the artifact-check
# workflow re-runs without a close/reopen bounce.
#
# After the PR merges, `release-please.yml` creates a non-draft
# GitHub Release + tag on main, uploads `release_artifacts/` as
# release assets (so end-user `brew install` / GitHub-Release
# downloads work), and fires `release: published`. The four
# registry workflows (release-pypi/npm/rust/homebrew) react to that
# and read binaries from main's `release_artifacts/` directly,
# rather than depending on the GitHub Release assets.

on:
  workflow_dispatch:
    inputs:
      pr:
        description: "Release-please PR number (e.g. 24)"
        required: true
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  dispatch:
    name: validate /build comment
    # Run only on PR-comment events that look like `/build` from a
    # maintainer. workflow_dispatch skips this job entirely and goes
    # straight to resolve-pr with `inputs.pr`.
    if: >-
      github.event_name == 'issue_comment'
      && github.event.issue.pull_request != null
      && startsWith(github.event.comment.body, '/build')
      && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    outputs:
      pr: ${{ steps.set.outputs.pr }}
    steps:
      - name: react to comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api -X POST \
            "repos/$GITHUB_REPOSITORY/issues/comments/${{ github.event.comment.id }}/reactions" \
            -f content=eyes
      - id: set
        run: echo "pr=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"

  resolve-pr:
    name: resolve PR head ref
    needs: [dispatch]
    # `always()` so resolve-pr still runs on workflow_dispatch (where
    # the dispatch job is skipped). Guard against dispatch failures
    # so a non-maintainer `/build` doesn't fall through to a build.
    if: |
      always() &&
      (github.event_name == 'workflow_dispatch'
       || needs.dispatch.result == 'success')
    runs-on: ubuntu-latest
    outputs:
      pr: ${{ steps.lookup.outputs.pr }}
      branch: ${{ steps.lookup.outputs.branch }}
      version: ${{ steps.lookup.outputs.version }}
    steps:
      - id: lookup
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event_name == 'workflow_dispatch' && inputs.pr || needs.dispatch.outputs.pr }}
        run: |
          set -euo pipefail
          BRANCH=$(gh pr view "$PR" --repo "$GITHUB_REPOSITORY" --json headRefName --jq .headRefName)
          [ -n "$BRANCH" ]
          # Read the manifest at the PR head to know which version
          # this build is for. Used in the artifact-commit message.
          VERSION=$(gh api "repos/$GITHUB_REPOSITORY/contents/.release-please-manifest.json?ref=$BRANCH" \
                      --jq '.content' | base64 -d | jq -r '.["."]')
          [ -n "$VERSION" ]
          echo "pr=$PR"           >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH"   >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building PR=$PR branch=$BRANCH version=$VERSION"

  build:
    name: build ${{ matrix.friendly }}
    needs: resolve-pr
    runs-on: ${{ matrix.os }}
    # libduckdb-sys' build.rs downloads the official prebuilt
    # libduckdb for the target triple instead of compiling DuckDB's
    # C++ from source. This drops the cold build from ~16 min to
    # ~30 s and avoids the manylinux legacy CXX ABI rejection that
    # blocks bundled builds inside maturin's container.
    env:
      DUCKDB_DOWNLOAD_LIB: "1"
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,    target: x86_64-unknown-linux-gnu,    friendly: linux-x64,      rustflags: "-C target-cpu=haswell" }
          - { os: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu,   friendly: linux-arm64,    rustflags: "-C target-cpu=cortex-a72" }
          - { os: windows-latest,   target: x86_64-pc-windows-msvc,      friendly: windows-x64,    rustflags: "-C target-cpu=haswell" }
          - { os: windows-11-arm,   target: aarch64-pc-windows-msvc,     friendly: windows-arm64,  rustflags: "" }
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-pr.outputs.branch }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          # rust-cache's pre-save `cleanTargetDir` walks `target/`,
          # treats any subdir without `CACHEDIR.TAG`/`Cargo.toml` as
          # a cargo profile dir, and via `cleanProfileTarget` removes
          # everything in it except `build`/`.fingerprint`/`deps`/
          # `examples`/`incremental`. That wipes
          # `target/duckdb-download/<triple>/<ver>/duckdb.{lib,so,dylib}`
          # while preserving cargo's libduckdb-sys fingerprint under
          # `target/<triple>/release/build/`. On restore, build.rs
          # short-circuits ("already built") and the linker fails with
          # LNK1181 / `cannot find -lduckdb`. CACHEDIR.TAG anywhere in
          # the tree doesn't help — the cleanup recurses and still
          # deletes loose files at every level. We accept it and
          # self-heal in the next step.
          key: ${{ matrix.target }}-libduckdb-v3
      - name: re-download libduckdb if rust-cache stripped it post-restore
        shell: bash
        run: |
          set -euo pipefail
          case "${{ matrix.target }}" in
            *-pc-windows-*) lib="duckdb.lib" ;;
            *-apple-darwin) lib="libduckdb.dylib" ;;
            *)              lib="libduckdb.so" ;;
          esac
          dir="target/duckdb-download/${{ matrix.target }}"
          if [ -d "$dir" ] && find "$dir" -name "$lib" -print -quit | grep -q .; then
            echo "$lib present under $dir; libduckdb-sys cache is intact"
          else
            echo "$lib missing under $dir; clearing libduckdb-sys fingerprint to force build.rs re-run"
            rm -rf "target/${{ matrix.target }}/release/build/libduckdb-sys-"*
          fi
      - name: build cli + napi
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        shell: bash
        # One cargo invocation builds all crates so the workspace dep
        # graph (the bulk of compile time) is compiled exactly once.
        # Maturin still runs separately because PyO3's `ext-module`
        # feature changes the link recipe; it'll reuse the warm target/
        # for shared deps.
        run: cargo build --release --target ${{ matrix.target }} -p lethe-cli -p lethe-node
      - name: package tarball / zip + collect napi
        shell: bash
        run: |
          set -euo pipefail
          STAGE="lethe-${{ matrix.friendly }}"
          DEPS="target/${{ matrix.target }}/release/deps"
          REL="target/${{ matrix.target }}/release"
          mkdir -p "$STAGE"
          # Bin crates' build.rs sets rpath=@loader_path/$ORIGIN, so
          # libduckdb only resolves when shipped next to the binary.
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "$REL/lethe.exe"             "$STAGE/"
            cp "$DEPS/duckdb.dll"           "$STAGE/"
            cp "$REL/lethe_node.dll"        "lethe-${{ matrix.friendly }}.node"
          elif [ "${{ runner.os }}" = "Linux" ]; then
            cp "$REL/lethe"             "$STAGE/"
            cp "$DEPS/libduckdb.so"     "$STAGE/"
            cp "$REL/liblethe_node.so"  "lethe-${{ matrix.friendly }}.node"
          else
            cp "$REL/lethe"                "$STAGE/"
            cp "$DEPS/libduckdb.dylib"     "$STAGE/"
            cp "$REL/liblethe_node.dylib"  "lethe-${{ matrix.friendly }}.node"
          fi
          cp README.md LICENSE "$STAGE/" 2>/dev/null || true
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a "${STAGE}.zip" "$STAGE"
          else
            tar -czf "${STAGE}.tar.gz" "$STAGE"
          fi
      - name: build maturin wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: crates/lethe-py
          target: ${{ matrix.target }}
          # `--auditwheel=repair` makes maturin run delocate (macOS) /
          # delvewheel (Windows) / auditwheel (Linux) so libduckdb is
          # bundled into the wheel and the rpath is patched. On
          # manylinux Linux this is the default but on macOS/Windows
          # it'd otherwise stop at `check` and only warn.
          args: --release --out wheels --strip --auditwheel=repair
          manylinux: auto
          # On Linux maturin spawns a manylinux docker container.
          # maturin-action filters env vars through a prefix allowlist
          # (CARGO_/CC/CFLAGS/MATURIN_/PYO3_/RUST/...) and silently
          # drops anything else — so the job-level `DUCKDB_DOWNLOAD_LIB`
          # never reaches cargo inside the container. Pass it through
          # explicitly via `-e` so libduckdb-sys uses the download path
          # instead of falling back to system libduckdb (which doesn't
          # exist in the manylinux image, hence `cannot find -lduckdb`).
          docker-options: -e DUCKDB_DOWNLOAD_LIB=1
      - name: collect artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out
          mv lethe-${{ matrix.friendly }}.* out/ 2>/dev/null || true
          mv crates/lethe-py/wheels/*.whl out/ 2>/dev/null || true
          ls -la out
      - uses: actions/upload-artifact@v4
        with:
          name: lethe-${{ matrix.friendly }}
          path: out/
          # Matrix artifacts are intermediate hand-offs to the
          # `commit` job in this same workflow run — they have no
          # value past the run finishing. Default retention is 90
          # days; trim to 7 to keep total artifact storage in check.
          retention-days: 7

  commit:
    name: commit artifacts to release-please PR
    needs: [resolve-pr, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-pr.outputs.branch }}
          # Push under RELEASE_PAT so the resulting commit fires
          # `pull_request: synchronize` and re-runs the
          # release-artifacts-check workflow on its own.
          token: ${{ secrets.RELEASE_PAT }}
          lfs: true
      - uses: actions/download-artifact@v4
        with:
          path: release_artifacts
          merge-multiple: true
      - name: commit and push
        env:
          BRANCH: ${{ needs.resolve-pr.outputs.branch }}
          VERSION: ${{ needs.resolve-pr.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name  "lethe-release-bot"
          git config user.email "lethe-release-bot@users.noreply.github.com"
          # Drop stale wheels (named `lethe_memory-X.Y.Z-…whl`) from
          # earlier versions so they don't pile up alongside the
          # current build's wheels.
          find release_artifacts -maxdepth 1 -name 'lethe_memory-*.whl' \
            ! -name "lethe_memory-${VERSION}-*.whl" -print -delete || true
          git add -A release_artifacts/
          if git diff --cached --quiet; then
            echo "no artifact changes to commit"
            exit 0
          fi
          git commit -m "chore(release): v${VERSION} linux+windows artifacts"
          git push origin "$BRANCH"
