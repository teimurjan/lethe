name: release-rust

# Triggered when release-please publishes a GitHub Release.
# Builds the `lethe` binary for five platform triples, attaches tarballs
# to the release, and publishes `lethe-core`, `lethe-tui`, `lethe-cli`
# to crates.io (in dependency order). Optionally updates the Homebrew
# tap at `teimurjan/homebrew-lethe`.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build (e.g. v0.6.0). Defaults to current ref."
        required: false

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-apple-darwin
            os: macos-13
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: install toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: install cross (linux aarch64 only)
        if: matrix.cross
        run: cargo install cross --locked
      - name: build
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release -p lethe-cli --target ${{ matrix.target }}
          else
            cargo build --release -p lethe-cli --target ${{ matrix.target }}
          fi
      - name: package
        shell: bash
        run: |
          set -euo pipefail
          BIN=lethe
          if [ "${{ runner.os }}" = "Windows" ]; then BIN="lethe.exe"; fi
          STAGE="lethe-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p "$STAGE"
          cp "target/${{ matrix.target }}/release/$BIN" "$STAGE/"
          cp README.md LICENSE "$STAGE/" 2>/dev/null || true
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a "${STAGE}.zip" "$STAGE"
            echo "ARTIFACT=${STAGE}.zip" >> "$GITHUB_ENV"
          else
            tar -czf "${STAGE}.tar.gz" "$STAGE"
            echo "ARTIFACT=${STAGE}.tar.gz" >> "$GITHUB_ENV"
          fi
      - name: upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        shell: bash
        run: gh release upload "$TAG" "$ARTIFACT" --clobber

  publish-crates:
    name: publish crates.io
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          cargo publish -p lethe-core --token "$CARGO_REGISTRY_TOKEN"
          # Wait for the index to refresh so dependents resolve.
          sleep 30
          cargo publish -p lethe-tui --token "$CARGO_REGISTRY_TOKEN"
          sleep 30
          cargo publish -p lethe-cli --token "$CARGO_REGISTRY_TOKEN"

  homebrew:
    name: update homebrew tap
    needs: build
    runs-on: ubuntu-latest
    # Skip until the tap repo is created; flip `if: true` once
    # `teimurjan/homebrew-lethe` exists and HOMEBREW_TAP_GITHUB_TOKEN is set.
    if: false
    steps:
      - uses: actions/checkout@v4
      - name: render formula
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          # Compute sha256s of the macOS tarballs published by the build job.
          curl -L -o lethe-arm64.tar.gz "https://github.com/teimurjan/lethe/releases/download/${TAG}/lethe-${TAG}-aarch64-apple-darwin.tar.gz"
          curl -L -o lethe-x64.tar.gz "https://github.com/teimurjan/lethe/releases/download/${TAG}/lethe-${TAG}-x86_64-apple-darwin.tar.gz"
          SHA_ARM=$(shasum -a 256 lethe-arm64.tar.gz | awk '{print $1}')
          SHA_X64=$(shasum -a 256 lethe-x64.tar.gz | awk '{print $1}')
          mkdir -p Formula
          cat > Formula/lethe.rb <<EOF
          class Lethe < Formula
            desc "Persistent memory store for LLM agents"
            homepage "https://github.com/teimurjan/lethe"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/teimurjan/lethe/releases/download/${TAG}/lethe-${TAG}-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_ARM}"
              else
                url "https://github.com/teimurjan/lethe/releases/download/${TAG}/lethe-${TAG}-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_X64}"
              end
            end

            def install
              bin.install "lethe"
            end

            test do
              system "#{bin}/lethe", "--version"
            end
          end
          EOF
      - name: push to tap repo
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${GH_TOKEN}@github.com/teimurjan/homebrew-lethe.git" tap
          mkdir -p tap/Formula
          cp Formula/lethe.rb tap/Formula/lethe.rb
          cd tap
          git config user.name "lethe-release-bot"
          git config user.email "lethe-release-bot@users.noreply.github.com"
          git add Formula/lethe.rb
          git commit -m "lethe ${TAG}"
          git push
