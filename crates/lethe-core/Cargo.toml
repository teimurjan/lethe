duckdb.workspace = true
ort.workspace = true
tokenizers.workspace = true
hf-hub.workspace = true
bincode.workspace = true
toml.workspace = true
walkdir.workspace = true
hex.workspace = true
once_cell.workspace = true

[dev-dependencies]
